<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生命原動力與互動風格測驗 (Cosmos Edition)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Mono&display=swap');

        :root {
            --bg-dark: #05070a; 
            --panel-bg: rgba(15, 20, 28, 0.96); 
            --text-main: #ecf0f1; 
            --text-muted: #94a3b8; 
            --accent-glow: #3498db; 
            --accent-active: #5dade2; 
            --border-color: #2c3e50; 
            --color-pioneer: #2ecc71; 
            --color-navigator: #f1c40f; 
            --color-guard: #e67e22; 
            --color-island: #e74c3c; 
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(52, 152, 219, 0.05) 0%, transparent 30%),
                radial-gradient(circle at 90% 90%, rgba(46, 204, 113, 0.03) 0%, transparent 30%);
            color: var(--text-main); 
            margin: 0; 
            padding: 10px; 
            display: flex;
            justify-content: center;
            min-height: 100vh;
            align-items: center;
            overflow-x: hidden; /* 防止旋轉圖案超出邊界 */
        }

        /* --- 修正後的轉輪 SVG 樣式 --- */
        .cosmic-washer {
            position: fixed;
            bottom: -60px;
            right: -60px;
            width: 250px;
            height: 250px;
            z-index: -1; /* 置於最底層 */
            opacity: 0.15; /* 調整透明度，讓它隱約可見 */
            animation: washer-spin 30s linear infinite;
        }

        @keyframes washer-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container { 
            max-width: 650px; 
            width: 100%;
            background: var(--panel-bg); 
            padding: 35px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            position: relative;
        }

        /* 頂部能量條 */
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent-glow), #2ecc71, transparent);
            animation: cosmic-flow 4s linear infinite;
        }

        @keyframes cosmic-flow {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        h1 { text-align: center; font-size: 1.6rem; letter-spacing: 2px; margin-bottom: 30px; color: var(--text-main); }
        .progress { font-family: 'Space Mono', monospace; font-size: 0.8rem; color: var(--text-muted); text-align: right; margin-bottom: 10px; }
        .q-text { font-weight: 600; font-size: 1.15rem; color: var(--accent-active); border-left: 4px solid var(--accent-glow); padding-left: 15px; margin-bottom: 25px; display: block;}
        .options { display: flex; flex-direction: column; gap: 15px; }

        button.opt { 
            background: rgba(45, 55, 72, 0.2); 
            border: 1px solid var(--border-color); 
            padding: 18px; 
            border-radius: 12px; 
            cursor: pointer; 
            text-align: left; 
            transition: all 0.3s; 
            font-size: 1rem; 
            color: var(--text-main);
        }
        button.opt:hover { border-color: var(--accent-glow); background: rgba(52, 152, 219, 0.1); transform: translateX(5px); }

        #result { display: none; text-align: center; }
        .result-box { padding: 25px; border-radius: 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); text-align: left; margin-top: 20px; }
        .type-tag { display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-family: 'Space Mono'; font-size: 0.9rem; margin-bottom: 15px; }
        
        .type-pioneer { color: var(--color-pioneer); border: 1px solid var(--color-pioneer); background: rgba(46, 204, 113, 0.1); }
        .type-navigator { color: var(--color-navigator); border: 1px solid var(--color-navigator); background: rgba(241, 196, 15, 0.1); }
        .type-guard { color: var(--color-guard); border: 1px solid var(--color-guard); background: rgba(230, 126, 34, 0.1); }
        .type-island { color: var(--color-island); border: 1px solid var(--color-island); background: rgba(231, 76, 60, 0.1); }

        .btn-reload { width: 100%; padding: 15px; margin-top: 30px; background: var(--accent-glow); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }
        
        .cc0-footer { margin-top: 40px; font-size: 0.75rem; color: var(--text-muted); border-top: 1px solid var(--border-color); padding-top: 20px; text-align: center; }
        .cc0-footer a { color: var(--accent-active); text-decoration: none; }
    </style>
</head>
<body>

    <svg class="cosmic-washer" viewBox="0 0 100 100">
        <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#2ecc71;stop-opacity:1" />
            </linearGradient>
        </defs>
        <circle cx="50" cy="50" r="45" fill="none" stroke="url(#grad)" stroke-width="0.5" stroke-dasharray="5, 10" />
        <circle cx="50" cy="50" r="30" fill="none" stroke="#3498db" stroke-width="2" stroke-dasharray="20, 5" />
        <circle cx="50" cy="50" r="8" fill="url(#grad)" opacity="0.5" />
        <line x1="50" y1="5" x2="50" y2="15" stroke="white" stroke-width="1" />
        <line x1="50" y1="85" x2="50" y2="95" stroke="white" stroke-width="1" />
        <line x1="5" y1="50" x2="15" y2="50" stroke="white" stroke-width="1" />
        <line x1="85" y1="50" x2="95" y2="50" stroke="white" stroke-width="1" />
    </svg>

    <div class="container">
        <h1>生命原動力與互動風格</h1>
        
        <div id="quiz-part">
            <div class="progress" id="progress">問題 01 / 24</div>
            <div id="question-content">
                <span class="q-text" id="q-text"></span>
                <div class="options">
                    <button class="opt" onclick="handleSelect(3)" id="opt-a"></button>
                    <button class="opt" onclick="handleSelect(2)" id="opt-b"></button>
                    <button class="opt" onclick="handleSelect(1)" id="opt-c"></button>
                </div>
            </div>
        </div>

        <div id="result">
            <h2>分析報告 (v1.2)</h2>
            <div class="result-box" id="result-box"></div>
            <button class="btn-reload" onclick="location.reload()">重新檢測</button>
        </div>

        <div class="cc0-footer">
            理論基礎：沈清松教授「外推理論」 | 內容編制：傅元罄 & AI | 視覺：Blender Studio Inspired | <a href="https://creativecommons.org/publicdomain/zero/1.0/deed.zh_TW" target="_blank">CC0 1.0 Universal</a>
        </div>
    </div>

<script>
    // 完整的 24 題數據
    const quizData = [
        { q: "面對一個與自己專業完全無關的新領域知識時：", a: "覺得是一個擴展視野的好機會，即便現在用不到也想了解看看。", b: "會先評估時間成本，確定對目前目標有具體幫助才會深入。", c: "傾向於專注在自己已知的專業領域，認為深耕比廣博更重要。" },
        { q: "當你看到一位非常成功且有才華的人時：", a: "會產生一種想與之交流、甚至與其共事的嚮往感。", b: "會冷靜分析對方的成功模式，思考有哪些是可以複製的經驗。", c: "會提醒自己每個人都有不同的人生賽道，不需要過度關注他人的光環。" },
        { q: "對於「長遠理想」這件事，你的真實感受是：", a: "它是指引我行動的核心動力，即使現實艱難也值得追求。", b: "它是階段性的目標，應隨著現實環境的變化而不斷調整。", c: "它是生活的調劑，但在壓力大時，生存與穩定才是首要考量。" },
        { q: "在獨處且放鬆的時刻，你最常浮現的念頭是：", a: "想要創作、記錄想法，或主動傳訊息關心久未聯絡的朋友。", b: "檢視近期的待辦清單，思考如何優化接下來的生活節奏。", c: "享受純粹的安靜與休息，不希望被任何訊息或任務打擾。" },
        { q: "對於「陌生的人事物」，你的第一直覺通常是：", a: "應該藏著一些我還不知道的驚喜或好處。", b: "先保持距離觀察，確定安全、沒麻煩了再說。", c: "傾向於認為那可能是個麻煩或是騙局。" },
        { q: "你認為「愛」最核心的表現應該是：", a: "因為欣賞對方，所以心甘情願、不求回報地對他好。", b: "雙方互相幫忙、提供情緒價值的一種平衡關係。", c: "為了不讓自己孤單，而產生的依賴感。" },
        { q: "當你嘗試解釋觀點但對方顯得困惑時，你的反應通常是：", a: "覺得溝通很有趣，會嘗試找不同的比喻或生活案例來重新轉述。", b: "認為可能雙方的認知基礎不同，會嘗試找一個折衷的簡單說法。", c: "認為既然觀點不同，就不強求對方理解，點到為止即可。" },
        { q: "面對與你立場完全相反的人（如支持不同政黨或教育觀點）：", a: "會好奇對方的邏輯是如何成形的，甚至想深入探討其背後的生命經驗。", b: "保持社交禮貌，尋求雙方都能接受的「最大公約數」來共處。", c: "認為道不同不相為謀，為了避免衝突，會選擇減少交集。" },
        { q: "當你學習一種新的表達方式或思考邏輯時：", a: "覺得自己看世界的「濾鏡」更新了，對原本熟悉的事物有了新感受。", b: "覺得獲得了一個實用的工具，能讓我在溝通或解決問題時更有效率。", c: "覺得這只是一種溝通技巧的磨練，本質上我還是原本的我。" },
        { q: "在激烈的討論中，你最希望能達成的結果是：", a: "雙方都能透過對話，共同摸索出一個之前都沒想過的新方案。", b: "雙方能達成共識或協議，讓後續的工作能順利推動。", c: "確保自己的立場與邏輯被正確理解，並守住自己的原則。" },
        { q: "當別人跟你訴苦，但那個痛苦你完全無法認同（如覺得他太脆弱）時：", a: "試著去想像那件事對他來說為什麼這麼痛，並試著陪伴他。", b: "給予理性的分析，希望他趕快變堅強、解決問題。", c: "覺得他太矯情了，不想聽，心裡有點排斥。" },
        { q: "你如何看待「跨部門」或「跨領域」的溝通？", a: "雖然累，但這是不同腦袋碰撞、產生新火花的大好機會。", b: "這是必要的應酬與協作，為了領薪水必須把它做完。", c: "這是災難，大家各說各話，最好各自做好分內事就好。" },
        { q: "團隊中出現了一個對整體有益但瑣碎、且無人認領的任務：", a: "既然對大家好，順手做了也無妨，能讓環境流動起來。", b: "會視當下的忙碌程度而定，行有餘力時才願意支援。", c: "認為應該建立明確的分工制度，不鼓勵這種無人認領的模糊空間。" },
        { q: "當你主動幫忙卻沒得到預期的正面回應時：", a: "雖會有些失落，但認為「給予」本身就是一種自發的選擇，不求回報。", b: "會微調與對方的互動距離，將資源轉向更懂得互相支持的人。", c: "會反思自己的行為是否過於熱心，之後會更謹慎地保護自己的能量。" },
        { q: "對於你掌握的獨門專業或關鍵資訊：", a: "樂於在對話中分享，認為知識在交流中會產生新的價值。", b: "會在適當的合作機會中交換出去，達成雙贏的結果。", c: "會謹慎保留，認為這是保護自我競爭力與專業地位的必要手段。" },
        { q: "當辦公室或群體氛圍壓抑時，你通常的選擇是：", a: "試著主動開啟對話、分享感受，希望能轉化當前的空氣。", b: "保持專業態度，做好分內工作，等待氛圍自然散去。", c: "採取低調姿態，避免情緒波動影響自己的工作效率。" },
        { q: "在與好友或另一半相處時，你最看重的是：", a: "兩個人能一起嘗試新事物，讓彼此的生命都變得更豐富。", b: "生活穩定，對方能提供我足夠的安全感與依賴。", c: "對方不能干涉我的自由，我要保有絕對的自主權。" },
        { q: "你如何評價自己的「大方」程度？", a: "只要能幫到人我就開心，付出的時候覺得自己心靈很富足。", b: "這是一種教養，我會在合理範圍內展現我的大方。", c: "我覺得付出就是損失，總覺得別人是在佔我便宜。" },
        { q: "當兩人堅持己見、爭執不下時，你最可能的提議是：", a: "「我們先不爭誰對誰錯，一起回頭去看看實際發生的細節是什麼？」", b: "「我們來對對看哪部分的邏輯有漏洞，找出一個最合理的結論。」", c: "「既然講不通，那我們就各自按照自己的方式負責，互不干涉。」" },
        { q: "聽完一場演講或看完一本好書後，你的感覺是：", a: "感覺生命被「滋養」了，看世界的方式似乎變得更有層次。", b: "記下一些能立即派上用場的重點或工具。", c: "雖然學到不少，但也消耗了大量能量，需要獨處恢復。" },
        { q: "身處壯闊的大自然景觀中，你的感受最接近：", a: "感到自己與萬物交織在一起，體驗到一種超越自我的平靜。", b: "讚嘆大自然的規律與美感，並希望能將這份體驗記錄下來。", c: "覺得景色很美，但也會注意到環境的便利性或氣候的影響。" },
        { q: "當你嘗試新方法卻失敗時，你的第一反應是：", a: "感到好奇，想知道「現實情況」跟我原本想的有什麼出入。", b: "感到懊惱，會快速檢討流程，尋找下一個更有效率的工具。", c: "感到挫折，會先停下來休息，避免在情緒不穩時繼續嘗試。" },
        { q: "關於「事情的真相」，你的體會是：", a: "世界上有很多面貌，我們需要不斷學習才能看得更全面。", b: "事情一定有標準答案，只要掌握了邏輯我就能贏。", c: "真相並不重要，每個人都只相信他想相信的。" },
        { q: "你是否有過「解決了一個大難題後，感覺整個人重生了」的經驗？", a: "經常有。因為親手處理了現實問題，感覺腦袋跟心靈都被洗乾淨了。", b: "偶爾有。通常是完成大專案領到獎金後的成就感。", c: "很少。只覺得解決了一個麻煩，鬆了一口氣，真煩。" }
    ];

    let currentIdx = 0;
    let score = 0;

    function updateQuestion() {
        const item = quizData[currentIdx];
        document.getElementById('q-text').innerText = item.q;
        document.getElementById('opt-a').innerText = item.a;
        document.getElementById('opt-b').innerText = item.b;
        document.getElementById('opt-c').innerText = item.c;
        document.getElementById('progress').innerText = `問題 ${ (currentIdx + 1).toString().padStart(2, '0') } / 24`;
    }

    function handleSelect(pts) {
        score += pts;
        currentIdx++;
        if(currentIdx < 24) updateQuestion();
        else showResult();
    }

    function showResult() {
        document.getElementById('quiz-part').style.display = 'none';
        const resPart = document.getElementById('result');
        const resBox = document.getElementById('result-box');
        resPart.style.display = 'block';

        let tClass = "", tLabel = "", tTitle = "", tDesc = "", tSuggest = "";

        if (score >= 61) {
            tClass = "type-pioneer"; tLabel = "🟢 開拓者 / Pioneer"; tTitle = "能量滿格的開拓者";
            tDesc = "你的生命狀態如泉水般噴湧，不斷向外擴張。你天生擁有一種「想讓世界更好」的原始動力，不計較得失，更在乎與不同的人產生精彩火花。";
            tSuggest = "1. 尋找同頻者：避免單向耗損能量。<br>2. 深度紮根：留點時間給安靜的獨處，讓開拓更有深度。";
        } else if (score >= 49) {
            tClass = "type-navigator"; tLabel = "🟡 導航員 / Navigator"; tTitle = "務實穩健的導航員";
            tDesc = "你如河流般流動，但在邊界處會自我保護。你是一個平衡的合作者，既懂得開放心胸，也知道如何保護能量。";
            tSuggest = "1. 嘗試無目的學習：打破務實框架。<br>2. 暫停思考：衝突時先觀察對方的感受。";
        } else if (score >= 37) {
            tClass = "type-guard"; tLabel = "🟠 精兵 / Sentinel"; tTitle = "守護堡壘的精兵";
            tDesc = "你的能量向內收縮。這通常是因為過去的善意曾被辜負，你把專業和冷靜當作盾牌。";
            tSuggest = "1. 從小地方開始分享：教導外行者找回流動感。<br>2. 主動給予：每天嘗試做一件小事。";
        } else {
            tClass = "type-island"; tLabel = "🔴 島嶼 / Island"; tTitle = "獨自修復的島嶼";
            tDesc = "你的能量嚴重回流，處於省電模式。你習慣把世界看成威脅，需要時間修復。";
            tSuggest = "1. 與非人類連結：去大自然走走。<br>2. 觀察而不評判：練習純粹觀察風景。";
        }

        resBox.innerHTML = `
            <div class="type-tag ${tClass}">${tLabel}</div>
            <h3>${tTitle}</h3>
            <p>${tDesc}</p>
            <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:10px; border-left:3px solid var(--accent-glow);">
                <strong>💡 針對性建議：</strong><br>${tSuggest}
            </div>
        `;
    }

    updateQuestion();
</script>
</body>
</html>
